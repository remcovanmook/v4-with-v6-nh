#!/usr/sbin/nft -f

flush ruleset

table inet filter {
	chain input {
		type filter hook input priority filter;
	}
	chain forward {
		type filter hook forward priority filter;
	}
	chain output {
		type filter hook output priority filter;
	}
}

# v4-with-v6-nh testbed: NAT the documentation prefixes out the uplink.
# Match the testbed source leaving any interface other than the host segment
# (enp0s2 here -- EDIT to match), so this needs no default route to exist at
# load time and survives an uplink rename. (198.51.100.0/24 and 2001:db8:1::/64
# are documentation prefixes, not globally routable.)
table ip v4gw_nat {
	chain postrouting {
		type nat hook postrouting priority srcnat;
		ip saddr 198.51.100.0/24 oifname != "enp0s2" masquerade
	}
}

table ip6 v4gw_nat {
	chain postrouting {
		type nat hook postrouting priority srcnat;
		ip6 saddr 2001:db8:1::/64 oifname != "enp0s2" masquerade
	}
}
