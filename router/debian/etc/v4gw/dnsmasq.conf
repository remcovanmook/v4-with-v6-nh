# v4-with-v6-nh interop testbed router (Debian 13): RA + DHCPv4 in one.
# Deployed at /etc/v4gw/dnsmasq.conf and run by v4gw-dnsmasq.service; see
# ../../README.md for the full native install.

# Host-facing interface -- EDIT to match (see `ip -br link`).
interface=enp0s2
bind-interfaces
port=0                    # no DNS service, just RA + DHCP

# --- IPv6: Router Advertisements ---------------------------------------
# Advertise this router as the IPv6 default router (nonzero router
# lifetime) and the on-link prefix (SLAAC).  The hosts' v4gwd / v4gwd-arp
# follow this default router to resolve the IPv4 next hop via ND.
enable-ra
dhcp-range=2001:db8:1::,slaac,64,30m

# DNS is advertised over IPv6 (RDNSS in the RA), NOT via IPv4 DHCP option 6.
# On an IPv6-only segment the IPv4 default is the v4-via-v6 route, which a
# host running the patched systemd-networkd only installs once the first RA
# arrives (it is deferred until an IPv6 default router is known). If the DNS
# server were an IPv4 address, systemd-resolved would query it during that
# startup gap on an interface-pinned socket, with no default route yet -- so
# the send falls back to an on-link ARP for the DNS server. Handing DNS out
# over IPv6 removes that dependency entirely: DNS rides the RA-provided IPv6
# default, which is up immediately. (dnsmasq folds this into the RA's RDNSS.)
dhcp-option=option6:dns-server,[2606:4700:4700::1111]

# --- IPv4: DHCP with the special-purpose sentinel gateway --------------
# The host segment has NO IPv4 address on the router (only 192.0.0.11).
# "shared-network" lets dnsmasq serve the 198.51.100.0/24 pool on that
# interface anyway -- the first address (192.0.0.11, which IS on the
# interface) selects the interface and becomes the DHCP server-id, so
# renewals unicast to the gateway and reach us.
shared-network=192.0.0.11,198.51.100.1

# Hand out host addresses from 198.51.100.0/24, but override the subnet
# mask sent to the client to /32 (option 1) so the host has no on-link
# IPv4 subnet at all -- everything routes via the gateway.  (dnsmasq needs
# a real netmask on the range for its own bookkeeping; the client sees the
# /32 from option 1.)
dhcp-range=198.51.100.10,198.51.100.250,255.255.255.0,30m
dhcp-option=1,255.255.255.255

# Option 3 (Router) is the sentinel signal the host daemons key on.
dhcp-option=3,192.0.0.11

# IPv4 DNS (option 6) is deliberately NOT sent -- see the RDNSS note above.
# An IPv4 DNS server would be queried over the v4-via-v6 path, which leaks an
# on-link ARP during the startup window before that path exists.
#   dhcp-option=6,1.1.1.1

# RFC 3442 classless static routes (option 121) are deliberately NOT sent.
# They were once included to spell out 192.0.0.11 as the off-subnet gateway,
# but testing across Linux, FreeBSD, macOS and Windows showed every DHCPv4
# client installs the Router-option (option 3) gateway on its own -- and 121
# is actively harmful here: per RFC 3442 it takes precedence over option 3,
# so a host running the patched systemd-networkd (UseIPv6ResolvedGateway=)
# would follow the classless ARP-resolved route instead of the IPv6-resolved
# next hop. Leaving it out is what lets the native v4-via-v6 path engage.
#   dhcp-option=121,192.0.0.11/32,0.0.0.0,0.0.0.0/0,192.0.0.11

# Install / withdraw each host's RFC 5549 return /32 route on lease.
dhcp-script=/usr/local/sbin/v4gw-lease.sh
