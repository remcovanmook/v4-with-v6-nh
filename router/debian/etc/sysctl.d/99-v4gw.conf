# v4-with-v6-nh testbed router.
# Forward between the uplink and the host-facing IPv6-only segment.
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Keep accepting the uplink's Router Advertisements even though we forward:
# with forwarding on, accept_ra=1 (the default) makes the kernel ignore RAs,
# which would cost the uplink its SLAAC address and IPv6 default route. The
# uplink here is enp0s1 -- EDIT to your internet-facing interface.
net.ipv6.conf.enp0s1.accept_ra = 2
