# debian-ha router: RA + DHCPv4 on both host segments, one shared IPv4 pool.
# DHCP follows the VRRP master: the shared-network binds to 192.0.0.11, which
# keepalived puts only on the segment's master, so each segment is served by its
# master.  bind-dynamic lets dnsmasq track the VIP appearing/leaving; the
# keepalived notify (v4gw-vrrp-notify.sh) nudges it on a state change.

interface=enp0s2
interface=enp0s3
bind-dynamic              # not bind-interfaces: tolerate the VIP moving
port=0                    # no DNS service, just RA + DHCP

# --- IPv6: Router Advertisements on both segments ---------------------
enable-ra
dhcp-option=option6:dns-server,[2606:4700:4700::1111]
dhcp-range=2001:db8:1::,slaac,64,30m
dhcp-range=2001:db8:2::,slaac,64,30m

# --- IPv4: one shared DHCP pool across both segments ------------------
# shared-network keys on 192.0.0.11 (the VIP), present on whichever segment
# this node masters, so the pool is served there.  The client sees a /32
# (option 1) and 192.0.0.11 as its gateway (option 3).
shared-network=192.0.0.11,198.51.100.1
dhcp-range=198.51.100.10,198.51.100.250,255.255.255.0,30m
dhcp-option=1,255.255.255.255
dhcp-option=3,192.0.0.11

# Never send option 121/249: per RFC 3442 they take precedence over option 3
# and defeat the IPv6-resolved path.

# Notify v4gwrd (identical daemon, from ../debian/) of each lease.
dhcp-script=/usr/local/sbin/v4gw-lease-notify.sh
