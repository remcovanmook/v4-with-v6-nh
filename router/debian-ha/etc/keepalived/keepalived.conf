# debian-ha: VRRP election of the anycast gateway 192.0.0.11.  Only the
# segment's master owns the VIP and answers ARP for it (a takeover sends
# gratuitous ARP); the return path and the DHCP server-id follow the master.
#
# Staggered priority makes each box master of one segment (active/active):
#   gw2: seg1 200 / seg2 100    gw3: seg1 100 / seg2 200

global_defs {
    vrrp_version 3
    enable_script_security
    script_user root
}

vrrp_instance VI_seg1 {
    state BACKUP
    interface enp0s2
    virtual_router_id 21
    priority 200                       # PER-NODE: gw2=200, gw3=100
    advert_int 1
    virtual_ipaddress {
        192.0.0.11/32 dev enp0s2 scope link
    }
    notify /usr/local/sbin/v4gw-vrrp-notify.sh
}

vrrp_instance VI_seg2 {
    state BACKUP
    interface enp0s3
    virtual_router_id 22
    priority 100                       # PER-NODE: gw2=100, gw3=200
    advert_int 1
    virtual_ipaddress {
        192.0.0.11/32 dev enp0s3 scope link
    }
    notify /usr/local/sbin/v4gw-vrrp-notify.sh
}
