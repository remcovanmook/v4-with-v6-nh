! Arista EOS -- draft-vanmook-intarea-ipv6-resolved-gateway router side
! Static v4-via-v6 confirmed since EOS-4.30.1
! (draft-ietf-intarea-v4-via-v6, Implementation Status)

! --- A. Return-path /32 routes with IPv6 next hop (static) ---------
ip route 198.51.100.1/32 Ethernet1 fe80::hostA-lladdr
!
! --- A. BGP with RFC 8950 extended next-hop encoding ---------------
router bgp 65001
   neighbor 2001:db8:ffff::2 remote-as 65002
   address-family ipv4
      neighbor 2001:db8:ffff::2 activate
      ! VERIFY exact knob on your EOS release; RFC 5549/8950 next-hop
      ! origination over a v6 session:
      neighbor 2001:db8:ffff::2 next-hop address-family ipv6 originate
!
! --- B/C. Terminate 192.0.0.11 + answer ARP (host-facing iface) ----
interface Ethernet1
   no switchport
   ip address 192.0.0.11/32
   ipv6 enable
   ! Owning the /32 makes EOS answer ARP for it natively.
   ! VERIFY: ARP requests arrive with an off-subnet sender IP (the
   ! host /32); confirm EOS answers rather than drops these.
!
! --- D. s5.2 enforcement: egress ACL on core/upstream interfaces --
ip access-list V6RG-NO-LEAK
   10 deny ip host 192.0.0.11 any
   20 deny ip any host 192.0.0.11
   30 permit ip any any
interface Ethernet2
   ! upstream/core-facing
   ip access-group V6RG-NO-LEAK out
! (No EOS knob for self-originated TTL; the ACL is the mechanism.)
!
! --- E. DHCPv4 relay, loopback giaddr + link selection -------------
interface Loopback0
   ip address 203.0.113.254/32
interface Ethernet1
   ip helper-address 203.0.113.53
! VERIFY on your release: source-interface + RFC 3527 link selection:
ip dhcp relay information option
ip dhcp relay source-interface Loopback0
