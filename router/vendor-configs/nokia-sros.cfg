# Nokia SR OS (MD-CLI flavour) -- draft-vanmook-intarea-ipv6-resolved-gateway
# NOTE: static v4-via-v6 is NOT known to be supported (absent from
# draft-ietf-intarea-v4-via-v6 implementation status); use BGP with
# extended next-hop encoding (RFC 8950).

# --- A. BGP RFC 8950 ------------------------------------------------
/configure router bgp group "V6CORE" {
    family { ipv4 true ipv6 true }
    # VERIFY exact leaf names on your release:
    extended-nh-encoding { ipv4 true }
    advertise-ipv6-next-hops { ipv4 true }
}
/configure router bgp neighbor "2001:db8:ffff::2" {
    group "V6CORE"
    peer-as 65002
}

# --- B. Terminate 192.0.0.11 ----------------------------------------
# Pattern: SR OS interfaces want a primary address; a /32 loopback
# owns the address, the segment interface stays IPv6-only.
/configure router interface "v6rg-anchor" {
    loopback
    ipv4 { primary { address 192.0.0.11 prefix-length 32 } }
}
/configure router interface "toHosts" {
    port 1/1/1
    ipv6 { }
}

# --- C. ARP for 192.0.0.11 ------------------------------------------
# With the address on a loopback, the segment interface will not
# answer ARP for it natively. VERIFY per release whether proxy-arp
# ('local-proxy-arp' / policy-scoped proxy-arp) can answer for a
# /32 that routes to a local loopback on an otherwise v4-less
# interface; SR OS proxy-arp is policy-driven, which allows scoping
# to exactly 192.0.0.11/32.

# --- D. s5.2 enforcement: egress IP filter on core/upstream ports ---
/configure filter ip-filter "V6RG-NO-LEAK" {
    entry 10 { match { src-ip { address 192.0.0.11/32 } } action { drop } }
    entry 20 { match { dst-ip { address 192.0.0.11/32 } } action { drop } }
    default-action accept
}
/configure router interface "toCore" egress { filter ip "V6RG-NO-LEAK" }
# (No SR OS knob for self-originated TTL; the filter is the mechanism.)

# --- E. DHCPv4 relay -------------------------------------------------
# SR OS allows an explicit gi-address, which is the clean answer to
# relaying from a v4-less segment:
/configure router interface "toHosts" ipv4 dhcp {
    admin-state enable
    server [203.0.113.53]
    gi-address 203.0.113.254
    option {
        action replace
        circuit-id { ascii-tuple }
        # VERIFY: link-selection sub-option (RFC 3527) leaf per release
    }
}
