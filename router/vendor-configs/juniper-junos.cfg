# Juniper JunOS -- draft-vanmook-intarea-ipv6-resolved-gateway
# NOTE: static v4-via-v6 is NOT known to be supported (absent from
# draft-ietf-intarea-v4-via-v6 implementation status); use BGP with
# extended-nexthop (RFC 8950).

# --- A. BGP RFC 8950 ------------------------------------------------
set protocols bgp group V6CORE type external
set protocols bgp group V6CORE neighbor 2001:db8:ffff::2 peer-as 65002
set protocols bgp group V6CORE family inet unicast extended-nexthop
set protocols bgp group V6CORE family inet6 unicast

# --- B/C. Terminate 192.0.0.11 + answer ARP ------------------------
# JunOS accepts a /32 on an Ethernet IFL; owning it yields native ARP
# response and echo reply.
set interfaces ge-0/0/0 unit 0 family inet address 192.0.0.11/32
set interfaces ge-0/0/0 unit 0 family inet6
# VERIFY: ARP requests arrive with off-subnet sender IPs (host /32s);
# confirm the RE answers rather than drops, and check ddos-protection
# ARP policers on shared segments.

# --- D. s5.2 enforcement: egress filter on core/upstream interfaces
set firewall family inet filter V6RG-NO-LEAK term src from source-address 192.0.0.11/32
set firewall family inet filter V6RG-NO-LEAK term src then discard
set firewall family inet filter V6RG-NO-LEAK term dst from destination-address 192.0.0.11/32
set firewall family inet filter V6RG-NO-LEAK term dst then discard
set firewall family inet filter V6RG-NO-LEAK term ok then accept
set interfaces ge-0/0/1 unit 0 family inet filter output V6RG-NO-LEAK
# (No JunOS knob for self-originated TTL; the filter is the mechanism.
#  Note: output filters on some platforms exempt RE-originated traffic
#  -- VERIFY on your hardware; a loopback input filter is the usual
#  complement.)

# --- E. DHCPv4 relay, option 82 + RFC 3527 link selection -----------
set interfaces lo0 unit 0 family inet address 203.0.113.254/32
set forwarding-options dhcp-relay server-group DHCP 203.0.113.53
set forwarding-options dhcp-relay active-server-group DHCP
set forwarding-options dhcp-relay group SEG1 interface ge-0/0/0.0
set forwarding-options dhcp-relay relay-option-82 circuit-id
# VERIFY: relay source/giaddr selection on an interface whose only
# inet address is 192.0.0.11 (or none); 'relay-source lo0.0' and
# link-selection sub-option support per release.
