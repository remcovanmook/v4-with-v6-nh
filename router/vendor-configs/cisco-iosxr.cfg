! Cisco IOS XR -- draft-vanmook-intarea-ipv6-resolved-gateway
! NOTE: static v4-via-v6 routes are NOT known to be supported on XR
! (absent from draft-ietf-intarea-v4-via-v6 implementation status);
! use BGP RFC 8950 for return-path routes.

! --- A. BGP over an IPv6 session carrying IPv4 NLRI (RFC 8950) -----
route-policy PASS
  pass
end-policy
router bgp 65001
 address-family ipv4 unicast
 !
 neighbor 2001:db8:ffff::2
  remote-as 65002
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
   ! VERIFY: XR negotiates the extended next-hop capability for
   ! v4-over-v6 sessions on recent releases; confirm per platform
   ! (feature historically documented as "BGP RFC 5549 support").
!
! --- B. Terminate 192.0.0.11 ---------------------------------------
! Pattern: XR may reject a /32 primary on a broadcast interface --
! VERIFY. Portable alternative: own it on a loopback; traffic to it
! arriving on the segment is delivered locally.
interface Loopback11
 ipv4 address 192.0.0.11 255.255.255.255
!
! --- C. ARP for 192.0.0.11 (unmodified-host tier) ------------------
! With the address on a loopback the LAN interface does not answer
! ARP for it natively. Options, in order of preference -- VERIFY
! which your release supports on a v4-less interface:
!  1. ipv4 address 192.0.0.11/32 directly on the interface, or
!  2. proxy-arp on the host-facing interface (answers for routed
!     destinations; scope carefully), plus the Loopback11 route.
interface GigabitEthernet0/0/0/0
 ipv6 enable
 ! proxy-arp   ! option 2, VERIFY + consider ACL scoping
!
! --- D. s5.2 enforcement: egress ACL on core/upstream interfaces --
ipv4 access-list V6RG-NO-LEAK
 10 deny ipv4 host 192.0.0.11 any
 20 deny ipv4 any host 192.0.0.11
 30 permit ipv4 any any
interface GigabitEthernet0/0/0/1
 ! upstream/core-facing
 ipv4 access-group V6RG-NO-LEAK egress
! (No XR knob for self-originated TTL; the ACL is the mechanism.)
!
! --- E. DHCPv4 relay with option 82 --------------------------------
dhcp ipv4
 profile V6RG relay
  helper-address vrf default 203.0.113.53 giaddr 203.0.113.254
  relay information option
 !
 interface GigabitEthernet0/0/0/0 relay profile V6RG
! VERIFY: explicit giaddr + relay on an interface with no IPv4
! address; RFC 3527 link selection support per release.
